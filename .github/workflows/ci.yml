name: CI

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:

permissions:
  contents: write

jobs:
  verus-and-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out simulator
        uses: actions/checkout@v4
        with:
          path: VliwSimulator

      - name: Check out Verus
        uses: actions/checkout@v4
        with:
          repository: verus-lang/verus
          ref: 4bdefc348abf699312e40be2de75b744402ced14
          path: verus

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.0
          components: rustc-dev, llvm-tools, rustfmt

      - name: Cache cargo artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
            verus/source/target
            verus/source/target-verus
            VliwSimulator/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('VliwSimulator/Cargo.lock', 'verus/rust-toolchain.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build Verus tooling
        working-directory: verus/source
        run: |
          ./tools/get-z3.sh
          source ../tools/activate
          vargo build --release

      - name: Stage Verus driver for cargo-verus
        working-directory: verus/source
        run: |
          install -m 755 target-verus/release/verus target/release/verus
          install -m 755 target-verus/release/rust_verify target/release/rust_verify
          cp target-verus/release/verus-root target/release/verus-root

      - name: Add cargo-verus to PATH
        run: |
          echo "${GITHUB_WORKSPACE}/verus/source/target/release" >> "$GITHUB_PATH"
          echo "VERUS_Z3_PATH=${GITHUB_WORKSPACE}/verus/source/z3" >> "$GITHUB_ENV"

      - name: Verify with Verus
        working-directory: VliwSimulator
        run: cargo verus verify

      - name: Run Rust tests
        working-directory: VliwSimulator
        run: cargo test --all-targets

      - name: Run example programs
        working-directory: VliwSimulator
        run: scripts/check_examples.sh

      - name: Build release simulator
        working-directory: VliwSimulator
        run: cargo build --release --bin vliw_simulator

      - name: Package release simulator
        id: package-simulator
        working-directory: VliwSimulator
        shell: bash
        run: |
          version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "vliw_simulator") | .version')"
          short_sha="${GITHUB_SHA::12}"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            artifact_version="${GITHUB_REF_NAME}"
          else
            artifact_version="v${version}+${short_sha}"
          fi

          package="vliw_simulator-${artifact_version}-linux-x86_64"
          mkdir -p "dist/${package}"
          install -m 755 target/release/vliw_simulator "dist/${package}/vliw_simulator"
          printf 'version=%s\ncommit=%s\nref=%s\n' "${artifact_version}" "${GITHUB_SHA}" "${GITHUB_REF_NAME}" > "dist/${package}/VERSION"
          tar -C dist -czf "dist/${package}.tar.gz" "${package}"

          echo "artifact_name=${package}" >> "${GITHUB_OUTPUT}"
          echo "asset_path=VliwSimulator/dist/${package}.tar.gz" >> "${GITHUB_OUTPUT}"

      - name: Upload simulator artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package-simulator.outputs.artifact_name }}
          path: ${{ steps.package-simulator.outputs.asset_path }}

      - name: Publish simulator release asset
        if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" "${{ steps.package-simulator.outputs.asset_path }}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
          || gh release upload "${GITHUB_REF_NAME}" "${{ steps.package-simulator.outputs.asset_path }}" --clobber

  coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Check out simulator
        uses: actions/checkout@v4
        with:
          path: VliwSimulator

      - name: Check out Verus
        uses: actions/checkout@v4
        with:
          repository: verus-lang/verus
          ref: 4bdefc348abf699312e40be2de75b744402ced14
          path: verus

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.0
          components: llvm-tools

      - name: Cache cargo artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
            VliwSimulator/target
          key: ${{ runner.os }}-coverage-${{ hashFiles('VliwSimulator/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-coverage-

      - name: Install cargo-llvm-cov
        working-directory: VliwSimulator
        run: cargo install cargo-llvm-cov --locked --force

      - name: Generate coverage report
        working-directory: VliwSimulator
        run: cargo llvm-cov --workspace --all-targets --lcov --output-path lcov.info

      - name: Print coverage summary
        working-directory: VliwSimulator
        run: cargo llvm-cov report --summary-only

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: VliwSimulator/lcov.info
