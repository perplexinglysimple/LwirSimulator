name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  verus-and-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out simulator
        uses: actions/checkout@v4
        with:
          path: LwirSimulator

      - name: Check out Verus
        uses: actions/checkout@v4
        with:
          repository: verus-lang/verus
          ref: 4bdefc348abf699312e40be2de75b744402ced14
          path: verus

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.0
          components: rustc-dev, llvm-tools, rustfmt

      - name: Cache cargo artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
            verus/source/target
            verus/source/target-verus
            LwirSimulator/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('LwirSimulator/Cargo.lock', 'verus/rust-toolchain.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build Verus tooling
        working-directory: verus/source
        run: |
          ./tools/get-z3.sh
          source ../tools/activate
          vargo build --release

      - name: Stage Verus driver for cargo-verus
        working-directory: verus/source
        run: |
          install -m 755 target-verus/release/verus target/release/verus
          install -m 755 target-verus/release/rust_verify target/release/rust_verify
          cp target-verus/release/verus-root target/release/verus-root

      - name: Add cargo-verus to PATH
        run: |
          echo "${GITHUB_WORKSPACE}/verus/source/target/release" >> "$GITHUB_PATH"
          echo "VERUS_Z3_PATH=${GITHUB_WORKSPACE}/verus/source/z3" >> "$GITHUB_ENV"

      - name: Verify with Verus
        working-directory: LwirSimulator
        run: cargo verus verify

      - name: Run Rust tests
        working-directory: LwirSimulator
        run: cargo test --all-targets

      - name: Run CPU simulator golden fixtures
        working-directory: LwirSimulator
        run: |
          set -euo pipefail
          mkdir -p target/ci-traces

          run_trace() {
            local width="$1"
            local fixture="$2"
            local trace="target/ci-traces/$(basename "$fixture").trace"

            cargo run --quiet --bin lwir_simulator -- --trace "$fixture" > "$trace"
            grep -q "^trace v1 width=${width}$" "$trace"
            grep -q "^final pc=.*halted=true$" "$trace"
          }

          run_trace 4 examples/fixtures/legal/w4_control_pred_mem_latency.lwir
          run_trace 8 examples/fixtures/legal/w8_pred_mem_latency.lwir
          run_trace 16 examples/fixtures/legal/w16_call_mem_latency.lwir

      - name: Run verifier golden fixtures
        working-directory: LwirSimulator
        run: |
          set -euo pipefail
          mkdir -p target/ci-verifier

          verify_clean() {
            local fixture="$1"
            local output="target/ci-verifier/$(basename "$fixture").txt"

            cargo run --quiet --bin lwir_verify -- "$fixture" > "$output"
            grep -q "Result  : CLEAN" "$output"
          }

          verify_illegal() {
            local fixture="$1"
            shift
            local output="target/ci-verifier/$(basename "$fixture").txt"
            local status

            set +e
            cargo run --quiet --bin lwir_verify -- "$fixture" > "$output" 2>&1
            status=$?
            set -e

            test "$status" -eq 1
            for rule in "$@"; do
              grep -q "$rule" "$output"
            done
          }

          verify_clean examples/fixtures/legal/w4_control_pred_mem_latency.lwir
          verify_clean examples/fixtures/legal/w8_pred_mem_latency.lwir
          verify_clean examples/fixtures/legal/w16_call_mem_latency.lwir

          verify_illegal examples/fixtures/illegal/w4_latency_mul_use.lwir gpr-ready-cycle
          verify_illegal examples/fixtures/illegal/w8_call_ret_same_bundle.lwir same-bundle-gpr-raw
          verify_illegal examples/fixtures/illegal/w16_predicate_and_slot.lwir same-bundle-pred-hazard slot-opcode-legality

  coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Check out simulator
        uses: actions/checkout@v4
        with:
          path: LwirSimulator

      - name: Check out Verus
        uses: actions/checkout@v4
        with:
          repository: verus-lang/verus
          ref: 4bdefc348abf699312e40be2de75b744402ced14
          path: verus

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.0
          components: llvm-tools

      - name: Cache cargo artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
            LwirSimulator/target
          key: ${{ runner.os }}-coverage-${{ hashFiles('LwirSimulator/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-coverage-

      - name: Install cargo-llvm-cov
        working-directory: LwirSimulator
        run: cargo install cargo-llvm-cov --locked --force

      - name: Generate coverage report
        working-directory: LwirSimulator
        run: cargo llvm-cov --workspace --all-targets --lcov --output-path lcov.info

      - name: Print coverage summary
        working-directory: LwirSimulator
        run: cargo llvm-cov report --summary-only

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: LwirSimulator/lcov.info
